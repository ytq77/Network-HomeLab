[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果
;谷歌FCM是推送服务,谷歌服务->谷歌服务

; ==========================================
; 第一梯队：绝对直连 (本地、私有、自定义直连)
; ==========================================
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
; 个人规则集（GitHub Raw）
ruleset=🎯 全球直连,clash-classic:https://raw.githubusercontent.com/yixuan-ovo/Network-HomeLab/refs/heads/main/OpenClash/yx_rules/yx_direct.yaml,28800
ruleset=🚀 强制代理,clash-classic:https://raw.githubusercontent.com/yixuan-ovo/Network-HomeLab/refs/heads/main/OpenClash/yx_rules/yx_proxy.yaml,28800
ruleset=REJECT,clash-classic:https://raw.githubusercontent.com/yixuan-ovo/Network-HomeLab/refs/heads/main/OpenClash/yx_rules/yx_reject.yaml,28800
; 自定义列表 (保持在最前)
ruleset=🎯 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
ruleset=🚀 强制代理,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 强制代理,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; ==========================================
; 第二梯队：国内特殊优化 (GoogleCN, SteamCN)
; ==========================================
ruleset=🎯 全球直连,[]GEOSITE,google-cn
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
ruleset=⏬ PT下载,[]GEOSITE,category-pt

; ==========================================
; 第三梯队：特定APP精细分流 (最关键的部分)
; 必须放在通用代理列表之前，否则会被通用列表“截胡”
; ==========================================

; --- 1. AI 与 生产力 (防风控) ---
ruleset=🤖 GPT-AI,[]GEOSITE,openai
ruleset=🤖 GPT-AI,[]GEOSITE,category-ai-!cn
; 必应必须在微软之前
ruleset=💬 Copilot,[]GEOSITE,bing
ruleset=🚀 GitHub,[]GEOSITE,github

; --- 2. 社交与聊天 ---
ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve

; --- 3. 流媒体 (地区限制严格) ---
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🎥 NetDisy,[]GEOSITE,netflix
ruleset=🎥 NetDisy,[]GEOSITE,disney
ruleset=🎥 NetDisy,[]GEOIP,netflix,no-resolve
ruleset=🎥 HBO+PV+Apple+,[]GEOSITE,hbo
ruleset=🎥 HBO+PV+Apple+,[]GEOSITE,apple-tvplus
ruleset=🎥 HBO+PV+Apple+,[]GEOSITE,primevideo
ruleset=🎥 Emby,[]GEOSITE,category-emby
ruleset=🎻 Spotify,[]GEOSITE,spotify
ruleset=📺 Bahamut,[]GEOSITE,bahamut
ruleset=🌎 国外媒体,[]GEOSITE,category-entertainment

; --- 4. 厂商服务 ---
; AppleTV 必须在 Apple 之前
ruleset=🍎 苹果服务,[]GEOSITE,apple
; OneDrive 在 Microsoft 之前
ruleset=Ⓜ️ 微软服务,[]GEOSITE,onedrive
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
; FCM 在 Google 之前
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=📢 谷歌服务,[]GEOSITE,google
ruleset=📢 谷歌服务,[]GEOIP,google,no-resolve

; --- 5. 金融与游戏 ---
; PayPal 建议直连或固定低风险地区代理
ruleset=💳 PayPal,[]GEOSITE,paypal
ruleset=🛒 国外电商,[]GEOSITE,category-ecommerce
; ruleset=🎮 PlayStation,[]GEOSITE,playstation
ruleset=🎮 Nintendo,[]GEOSITE,nintendo
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=🎮 游戏平台,[]GEOSITE,category-games
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest

; ==========================================
; 第四梯队：通用代理列表 (大网兜底)
; 只有上面没匹配到的，才会落到这里
; ==========================================
ruleset=🚀 强制代理,[]GEOSITE,gfw

; ==========================================
; 第五梯队：最终兜底 (Final)
; ==========================================
; 国内域名/IP 兜底直连
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

; 非标端口优化
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800

; 漏网之鱼
ruleset=🐟 漏网之鱼,[]FINAL


